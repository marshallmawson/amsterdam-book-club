server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (temporarily disabled for cache busting)
    # TODO: After users have refreshed, restore caching with: expires 1y; add_header Cache-Control "public, immutable";
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires epoch;
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        etag off;
    }

    # Don't cache index.html (aggressive cache busting)
    location = /index.html {
        expires epoch;
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        etag off;
    }
}
